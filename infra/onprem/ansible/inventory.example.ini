# Example inventory for the k3s playbook.
#
# Mac (Tier 2) — spin up a VM with Multipass first, then point here:
#   multipass launch --name k3s-node1 --cpus 2 --memory 2G --disk 10G
#   multipass info k3s-node1        # note the IP
#   multipass exec k3s-node1 -- sudo bash -c 'echo "<your pubkey>" >> /home/ubuntu/.ssh/authorized_keys'
#
# Production — your real on-prem hosts.

[k3s_nodes]
k3s-node1 ansible_host=192.168.64.10 ansible_user=ubuntu
