apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: rollouts-demo
  template:
    metadata:
      labels:
        app: rollouts-demo
    spec:
      containers:
        - name: rollouts-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 10s }
        - setWeight: 50
        # Indefinite pause = the manual promote/abort gate the Phase 4 demo drives:
        #   kubectl argo rollouts promote rollouts-demo   (advance to 75% → stable)
        #   kubectl argo rollouts abort   rollouts-demo   (roll back to stable)
        - pause: {}
        - setWeight: 75
        - pause: { duration: 10s }
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: rollouts-demo
  ports:
    - name: http
      port: 80
      targetPort: http
