# Local MLX Qwen endpoint for kagent running inside Docker Desktop kind.
# `host.docker.internal` resolves from kind nodes to the macOS host. The proxy
# normalizes Qwen tool calls and exposes an OpenAI-compatible /v1 endpoint.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: local-qwen-model-config
  namespace: kagent
spec:
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  model: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
  provider: OpenAI
  openAI:
    baseUrl: http://host.docker.internal:18091/v1
