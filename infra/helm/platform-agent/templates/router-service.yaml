{{- if .Values.router.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-agent.fullname" . }}-router
  labels:
    {{- include "platform-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  selector:
    app.kubernetes.io/name: {{ include "platform-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
  ports:
    - name: http
      port: {{ .Values.router.port }}
      targetPort: http
{{- end }}
