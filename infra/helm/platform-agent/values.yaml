# Default values — safe-by-default: executor log-only, drain RBAC off, router off.
# Substrate overlays: values-kind.yaml / values-k3s.yaml (env x substrate axis).

image:
  repository: platform-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# External model brain (never in-cluster). The kind overlay points this at the
# host MLX endpoint, mirroring infra/onprem/kagent/qwen-model-config.yaml.
llm:
  endpoint: "http://host.docker.internal:18091/v1"
  model: "mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit"

# Offline JSONL stores (activity / pending approvals / incidents). Single-writer
# by design: keep replicas at 1 per component. Setting stateStore (below) is the
# multi-replica path — then persistence can be disabled entirely.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""  # substrate overlays set this (kind: standard, k3s: local-path)
  mountPath: /data

# SQL State Store (roadmap ④, PLATFORM_STATE_DSN). Empty = JSONL mode, unchanged.
# Production: point existingSecret at a Secret holding the DSN (e.g. built from
# the aws-production Terraform module's Aurora endpoint + managed password) —
# never put a real DSN in a values file. `dsn` is the dev/kind convenience.
# With a store configured, set persistence.enabled=false and replicas > 1.
stateStore:
  dsn: ""
  existingSecret: ""
  secretKey: "dsn"

webhook:
  enabled: true
  port: 8078
  replicas: 1  # JSONL mode is single-writer; scale out only with stateStore set
  # Real kubectl remediation. false = log-only (product default). Flipping this
  # to true makes the Day-2 executor patch live workloads via the ServiceAccount.
  executorLive: false
  rbac:
    # Namespaced least-privilege for restart/undo/scale (verbs enumerated, no "*").
    enabled: true
    # Cluster-scoped drain rights (nodes cordon + pod eviction across namespaces).
    # Kept separate and off by default — grant only where polite drain is wanted.
    allowDrain: false
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

router:
  # The deploy front door builds/pushes images, which needs build tooling this
  # image intentionally does not carry (cloud paths use CodeBuild etc.). Enable
  # only for the SSE/routing/recording surface, or behind an external builder.
  enabled: false
  port: 8077
  replicas: 1
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

# Extra env for either component, e.g. PLATFORM_MONTHLY_BUDGET_USD.
extraEnv: []
